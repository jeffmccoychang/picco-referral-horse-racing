<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral Raffle — Horse Race</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:    #0a1a0d; --bg2: #0d2211; --panel: #1a4d25;
    --g1: #4ecb71; --g2: #7ddf96; --g3: #b2f0c0;
    --red: #e94560; --yel: #f5a623; --white: #d6f0db; --dim: #2d7a3a;
    --px: 'Press Start 2P', monospace;
  }
  body { font-family: var(--px); background: var(--bg); color: var(--white); min-height: 100vh; padding: 2rem 1rem 3rem; display: flex; flex-direction: column; align-items: center; }
  body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px); pointer-events: none; z-index: 998; }
  #container { width: 100%; max-width: 860px; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: clamp(20px,5vw,40px); color: var(--g2); text-shadow: 4px 4px 0 #061209, -2px -2px 0 var(--g1), 2px 0 0 var(--red), -2px 0 0 var(--g3); letter-spacing: 4px; line-height: 1.3; margin-bottom: 10px; }
  .header .tagline { font-size: 8px; letter-spacing: 3px; color: var(--dim); margin-top: 8px; }
  @keyframes blink { 50% { opacity: 0; } }
  .score-bar { display: flex; justify-content: space-between; font-size: 8px; border: 2px solid var(--panel); background: var(--bg2); padding: 8px 14px; margin-bottom: 1.2rem; letter-spacing: 1px; }
  .score-bar span { color: var(--yel); }
  .panel { background: var(--bg2); border: 3px solid var(--panel); outline: 2px solid var(--g1); outline-offset: -5px; padding: 1.4rem; margin-bottom: 1.2rem; }
  .panel-title { font-size: 9px; letter-spacing: 2px; color: var(--g2); margin-bottom: 12px; }
  .btn { padding: 10px 18px; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; border: 0; outline: none; background: var(--panel); color: var(--white); cursor: pointer; font-family: var(--px); box-shadow: 0 4px 0 #071a10, 4px 0 0 #0a2a14; transition: all 0.08s; }
  .btn:hover { background: var(--dim); }
  .btn:active { transform: translate(2px,3px); box-shadow: none; }
  .btn.primary { background: var(--red); color: #fff; box-shadow: 0 4px 0 #7a1828, 4px 0 0 #9b2030; }
  .btn.primary:hover { background: #ff6080; }
  .btn.go { background: var(--panel); color: var(--g1); box-shadow: 0 4px 0 #0d2211, 4px 0 0 #0f3820; }
  .btn.go:hover { background: var(--dim); }
  .btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  /* Setup form */
  .player-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .player-row input[type=text] { flex: 1; font-size: 10px; padding: 7px 10px; border: 2px solid var(--dim); background: var(--bg); color: var(--white); font-family: var(--px); outline: none; }
  .player-row input[type=text]:focus { border-color: var(--g2); }
  .emoji-btn { font-size: 18px; background: var(--bg); border: 2px solid var(--dim); padding: 4px 8px; cursor: pointer; line-height: 1; min-width: 40px; text-align: center; }
  .emoji-btn:hover { border-color: var(--g2); }
  .remove-btn { font-size: 9px; font-family: var(--px); background: none; border: 2px solid var(--dim); color: var(--dim); cursor: pointer; padding: 5px 8px; }
  .remove-btn:hover { border-color: var(--red); color: var(--red); }
  .setup-actions { margin-top: 12px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .emoji-picker { position: fixed; background: var(--bg2); border: 2px solid var(--g1); padding: 8px; z-index: 1000; display: flex; flex-wrap: wrap; gap: 6px; max-width: 230px; }
  .emoji-picker span { font-size: 20px; cursor: pointer; padding: 4px; }
  .emoji-picker span:hover { background: var(--panel); }

  /* Track */
  #track-wrap { background: #0d1f12; border: 3px solid var(--panel); outline: 2px solid var(--g1); outline-offset: -5px; padding: 10px 0; margin-bottom: 1.2rem; overflow: hidden; }
  .lane { display: flex; align-items: center; height: 38px; margin: 2px 0; }
  .lane:nth-child(odd) .track { background: rgba(78,203,113,0.04); }
  .lane-lbl { width: 110px; min-width: 110px; font-size: 7px; color: var(--g1); text-align: right; padding-right: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 1px; }
  .track { flex: 1; position: relative; height: 100%; }
  .track-bg { position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent, transparent calc(10% - 1px), rgba(91,107,192,0.1) calc(10% - 1px), rgba(91,107,192,0.1) 10%); }
  .horse-wrap { position: absolute; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 5px; will-change: left; }
  .horse-emoji { font-size: 20px; line-height: 1; flex-shrink: 0; }
  .name-tag { font-size: 7px; white-space: nowrap; letter-spacing: 1px; }
  .finish-line { position: absolute; right: 0; top: 0; bottom: 0; width: 18px; background-image: repeating-conic-gradient(#fff 0% 25%,#000 0% 50%); background-size: 9px 9px; border-left: 2px solid #fff; z-index: 2; }
  @keyframes gallop-bounce { from { transform: translateY(0); } to { transform: translateY(-3px); } }
  .racing .horse-emoji { animation: gallop-bounce 0.28s ease-in-out infinite alternate; }

  /* Winner */
  #winner-banner { display: none; text-align: center; padding: 2rem 1rem; background: var(--bg2); border: 3px solid var(--panel); outline: 2px solid var(--red); outline-offset: -5px; margin-bottom: 1.2rem; }
  #winner-banner .hs { font-size: 8px; letter-spacing: 3px; color: var(--yel); margin-bottom: 12px; animation: blink 1.1s step-end infinite; }
  #winner-banner .trophy { font-size: 40px; display: block; margin-bottom: 10px; }
  #winner-banner .wlbl { font-size: 8px; letter-spacing: 3px; color: var(--dim); margin-bottom: 8px; }
  #winner-banner .wname { font-size: clamp(14px,3vw,24px); color: var(--red); text-shadow: 3px 3px 0 #7a1828; letter-spacing: 3px; line-height: 1.4; margin-bottom: 8px; }
  #winner-banner .wsub { font-size: 8px; letter-spacing: 2px; color: var(--g1); }
  #controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  #speed-wrap { display: flex; align-items: center; gap: 8px; font-size: 8px; letter-spacing: 1px; color: var(--dim); margin-left: auto; }
  input[type=range] { accent-color: var(--g2); cursor: pointer; width: 80px; }
  #remaining { font-size: 8px; color: var(--dim); letter-spacing: 1px; margin-bottom: 8px; text-align: right; }
  #remaining span { color: var(--g1); }
  .confetti-piece { position: fixed; pointer-events: none; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>
<div class="header">
  <h1>GRAND PRIX</h1>
  <div class="tagline">— REFERRAL RAFFLE · HORSE RACE —</div>
</div>
<div id="container">
  <div class="score-bar">
    <div>1UP &nbsp;<span id="round-count">00</span></div>
    <div>PLAYERS &nbsp;<span id="player-count">00</span></div>
    <div>CREDIT &nbsp;<span>01</span></div>
  </div>

  <div id="setup-card" class="panel">
    <div class="panel-title">&gt; ENTER PARTICIPANTS</div>
    <div id="player-rows"></div>
    <div class="setup-actions">
      <button class="btn go" onclick="addPlayerRow()">+ ADD PLAYER</button>
      <button class="btn primary" onclick="startSetup()">START RACE &gt;</button>
    </div>
  </div>

  <div id="race-view" style="display:none">
    <div id="remaining">REMAINING: <span id="remaining-count">0</span> PLAYERS</div>
    <div id="track-wrap"><div id="track"></div></div>
    <div id="winner-banner">
      <div class="hs">★ NEW HIGH SCORE ★</div>
      <span class="trophy">🏆</span>
      <div class="wlbl">WINNER</div>
      <div class="wname" id="winner-name"></div>
      <div class="wsub">WINS THE RAFFLE!</div>
    </div>
    <div class="panel" style="padding:1rem 1.25rem">
      <div id="controls">
        <button class="btn primary" id="race-btn" onclick="startRace()">START RACE &gt;</button>
        <button class="btn go" id="next-btn" onclick="nextRace()" style="display:none">NEXT RACE &gt;</button>
        <button class="btn" onclick="resetRace()">NEW RAFFLE</button>
        <div id="speed-wrap">SPD: <input type="range" min="1" max="5" value="1" id="speed-slider" step="1"> <span id="speed-label">1</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = ['#4ecb71','#e94560','#f5a623','#7ddf96','#80dfff','#ffb347','#ff6eb4','#b2f0c0','#f08080','#c8a2c8','#4ecb71','#e94560','#f5a623','#7ddf96','#80dfff','#ffb347','#ff6eb4','#b2f0c0','#f08080','#c8a2c8','#4ecb71','#e94560','#f5a623','#7ddf96','#80dfff','#ffb347','#ff6eb4','#b2f0c0','#f08080','#c8a2c8'];
const DEFAULT_EMOJIS = ['🐴','🦄','🐎','🐴','🦄','🐎','🐴','🦄','🐎','🐴'];
const EMOJI_OPTIONS  = ['🐴','🦄','🐎','🏇','🐲','🐯','🦊','🐺','🐻','🦁','🐸','🐧','🦅','🐬','🦋','⚡','🔥','💎','🌟','🚀'];

let participants = [], participantEmojis = [];
let pos=[], vel=[], phase=[], phaseTimer=[];
let finished=false, animId=null, winnerIdx=-1, raceStarted=false, roundNum=0;
let activePicker = null;

// ── Emoji picker ──────────────────────────────────────────
function cycleEmoji(row, dir) {
  const btn = row.querySelector('.emoji-btn');
  const cur = EMOJI_OPTIONS.indexOf(btn.textContent);
  const next = (cur + dir + EMOJI_OPTIONS.length) % EMOJI_OPTIONS.length;
  btn.textContent = EMOJI_OPTIONS[next];
}

function togglePicker(btn, e) {
  e.stopPropagation();
  closePicker();
  const picker = document.createElement('div');
  picker.className = 'emoji-picker';
  EMOJI_OPTIONS.forEach(em => {
    const sp = document.createElement('span');
    sp.textContent = em;
    sp.onclick = ev => { ev.stopPropagation(); btn.textContent = em; closePicker(); };
    picker.appendChild(sp);
  });
  const r = btn.getBoundingClientRect();
  picker.style.cssText = `top:${r.bottom+window.scrollY+4}px;left:${r.left+window.scrollX}px;`;
  document.body.appendChild(picker);
  activePicker = picker;
}
function closePicker() { if (activePicker) { activePicker.remove(); activePicker = null; } }
document.addEventListener('click', closePicker);

// ── Player rows ───────────────────────────────────────────
function addPlayerRow(name='', emoji=null) {
  const rows = document.getElementById('player-rows');
  const idx  = rows.children.length;
  const em   = emoji || DEFAULT_EMOJIS[idx % DEFAULT_EMOJIS.length];

  const row = document.createElement('div');
  row.className = 'player-row';

  const emojiBtn = document.createElement('button');
  emojiBtn.className = 'emoji-btn';
  emojiBtn.textContent = em;
  emojiBtn.onclick = (e) => togglePicker(emojiBtn, e);

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'PLAYER ' + (idx + 1);
  input.value = name;
  input.maxLength = 20;
  input.addEventListener('keydown', e => {
    const allInputs = [...document.querySelectorAll('.player-row input[type=text]')];
    const i = allInputs.indexOf(input);
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (i < allInputs.length - 1) allInputs[i + 1].focus();
      else { addPlayerRow(); setTimeout(() => { const u=[...document.querySelectorAll('.player-row input[type=text]')]; u[u.length-1].focus(); },0); }
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (i > 0) allInputs[i - 1].focus();
    }
    if (e.key === 'ArrowLeft' && input.selectionStart === 0 && input.selectionEnd === 0) {
      // cursor at start — cycle emoji left
      e.preventDefault();
      cycleEmoji(row, -1);
    }
    if (e.key === 'ArrowRight' && input.selectionStart === input.value.length && input.selectionEnd === input.value.length) {
      // cursor at end — cycle emoji right
      e.preventDefault();
      cycleEmoji(row, 1);
    }
    if (e.key === 'Backspace' && input.value === '') {
      // empty input — delete row
      e.preventDefault();
      if (document.getElementById('player-rows').children.length <= 2) return;
      const prev = i > 0 ? allInputs[i - 1] : allInputs[1];
      row.remove(); closePicker();
      if (prev) prev.focus();
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      if (i < allInputs.length - 1) allInputs[i + 1].focus();
      else startSetup();
    }
  });

  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove-btn';
  removeBtn.textContent = '✕';
  removeBtn.onclick = () => {
    if (document.getElementById('player-rows').children.length <= 2) {
      alert('Minimum 2 players required.'); return;
    }
    row.remove(); closePicker();
  };

  row.appendChild(emojiBtn);
  row.appendChild(input);
  row.appendChild(removeBtn);
  rows.appendChild(row);
}

function getPlayersFromForm() {
  return [...document.querySelectorAll('.player-row')].map(row => ({
    name:  row.querySelector('input[type=text]').value.trim(),
    emoji: row.querySelector('.emoji-btn').textContent
  })).filter(p => p.name);
}

// Pre-fill 5 rows
for (let i = 0; i < 5; i++) addPlayerRow();

// ── Setup → Race ──────────────────────────────────────────
function startSetup() {
  const players = getPlayersFromForm();
  if (players.length < 2) { alert('Please enter at least 2 player names.'); return; }
  originalPlayers   = players.slice(0, 30);
  participants      = originalPlayers.map(p => p.name);
  participantEmojis = originalPlayers.map(p => p.emoji);
  roundNum = 0;
  buildTrack();
  document.getElementById('setup-card').style.display = 'none';
  document.getElementById('race-view').style.display  = 'block';
}

function updateHUD() {
  document.getElementById('round-count').textContent     = String(roundNum).padStart(2,'0');
  document.getElementById('player-count').textContent    = String(participants.length).padStart(2,'0');
  document.getElementById('remaining-count').textContent = participants.length;
}

function buildTrack() {
  const trackEl = document.getElementById('track');
  trackEl.innerHTML = '';
  const n = participants.length;
  pos        = new Array(n).fill(0);
  vel        = participants.map(()=>0.8+Math.random()*0.4);
  phase      = participants.map(()=>'cruise');
  phaseTimer = participants.map(()=>40+Math.floor(Math.random()*80));
  finished=false; winnerIdx=-1; raceStarted=false;
  document.getElementById('winner-banner').style.display = 'none';
  document.getElementById('race-btn').disabled = false;
  document.getElementById('race-btn').textContent = 'START RACE >';
  document.getElementById('next-btn').style.display = 'none';
  updateHUD();

  participants.forEach((name, i) => {
    const laneEl = document.createElement('div'); laneEl.className = 'lane';
    const labelEl = document.createElement('div'); labelEl.className = 'lane-lbl'; labelEl.title = name; labelEl.textContent = name;
    const trackDiv = document.createElement('div'); trackDiv.className = 'track'; trackDiv.id = 't'+i;
    const bgDiv = document.createElement('div'); bgDiv.className = 'track-bg';
    const hw = document.createElement('div'); hw.className = 'horse-wrap'; hw.id = 'h'+i; hw.style.left = '2px';
    const emoji = document.createElement('span'); emoji.className = 'horse-emoji'; emoji.textContent = participantEmojis[i] || '🐴';
    const nameTag = document.createElement('span'); nameTag.className = 'name-tag'; nameTag.style.color = COLORS[i%COLORS.length]; nameTag.textContent = name;
    const fl = document.createElement('div'); fl.className = 'finish-line';
    hw.appendChild(emoji); hw.appendChild(nameTag);
    trackDiv.appendChild(bgDiv); trackDiv.appendChild(hw); trackDiv.appendChild(fl);
    laneEl.appendChild(labelEl); laneEl.appendChild(trackDiv);
    trackEl.appendChild(laneEl);
  });
}

function getTrackW() {
  const t = document.getElementById('t0'), h = document.getElementById('h0');
  return t ? Math.max(t.clientWidth - 18 - Math.round((h?h.offsetWidth:70)*0.4), 200) : 400;
}

// ── Race ──────────────────────────────────────────────────
document.getElementById('speed-slider').oninput = e => document.getElementById('speed-label').textContent = e.target.value;

function startRace() {
  if (finished || raceStarted) return;
  raceStarted = true; roundNum++;
  document.getElementById('race-btn').disabled = true;
  document.getElementById('round-count').textContent = String(roundNum).padStart(2,'0');
  document.querySelectorAll('.horse-wrap').forEach(el => el.classList.add('racing'));

  const n = participants.length;
  winnerIdx = Math.floor(Math.random() * n);
  const BASE = 1.2 * parseInt(document.getElementById('speed-slider').value);
  vel        = participants.map(()=>BASE*(0.7+Math.random()*0.6));
  phase      = participants.map(()=>'cruise');
  phaseTimer = participants.map(()=>40+Math.floor(Math.random()*80));
  let done = false;

  function tick() {
    if (done) return;
    const tw = getTrackW();
    for (let i = 0; i < n; i++) {
      if (pos[i] >= tw) continue;
      if (--phaseTimer[i] <= 0) {
        const r = Math.random();
        phase[i] = phase[i]==='surge' ? (r<0.6?'cruise':'tired') : phase[i]==='tired' ? (r<0.7?'cruise':'surge') : (r<0.4?'surge':r<0.7?'cruise':'tired');
        phaseTimer[i] = 40+Math.floor(Math.random()*80);
      }
      const progress = pos[i]/tw;
      let tv = (i===winnerIdx && progress>0.72)
        ? BASE*1.55
        : BASE*(phase[i]==='surge'?1.4:phase[i]==='tired'?0.55:1.0)*(0.85+Math.random()*0.3);
      if (i!==winnerIdx && progress>0.85) tv *= 0.5;
      vel[i] = Math.max(0.2, vel[i]+(tv-vel[i])*0.08+(Math.random()-0.5)*0.15);
      pos[i] = Math.min(tw, pos[i]+vel[i]);
      const hw = document.getElementById('h'+i);
      if (hw) hw.style.left = Math.round(pos[i])+'px';
      if (pos[i]>=tw && !done) { done=true; finished=true; showWinner(participants[i],i); return; }
    }
    animId = requestAnimationFrame(tick);
  }
  animId = requestAnimationFrame(tick);
}

function showWinner(name, idx) {
  participants.splice(idx,1); participantEmojis.splice(idx,1);
  document.getElementById('winner-name').textContent = name;
  document.getElementById('winner-banner').style.display = 'block';
  updateHUD(); spawnConfetti();
  document.getElementById('next-btn').style.display = participants.length>=2 ? 'inline-block' : 'none';
}

function nextRace() {
  if (animId) cancelAnimationFrame(animId);
  document.getElementById('winner-banner').style.display = 'none';
  buildTrack();
}

function resetRace() {
  if (animId) cancelAnimationFrame(animId);
  finished=false; raceStarted=false; winnerIdx=-1; roundNum=0;
  participants=[]; participantEmojis=[];
  document.getElementById('player-rows').innerHTML='';
  if (originalPlayers.length > 0) {
    originalPlayers.forEach(p => addPlayerRow(p.name, p.emoji));
  } else {
    for (let i=0;i<5;i++) addPlayerRow();
  }
  document.getElementById('setup-card').style.display = 'block';
  document.getElementById('race-view').style.display  = 'none';
}

function spawnConfetti() {
  const cols=['#4ecb71','#e94560','#f5a623','#7ddf96','#80dfff','#ff6eb4'];
  for (let i=0;i<80;i++) {
    const el=document.createElement('div'); el.className='confetti-piece';
    const s=6+Math.random()*8;
    el.style.cssText=`width:${s}px;height:${s}px;background:${cols[i%cols.length]};left:${Math.random()*100}%;top:-20px;animation-duration:${1.8+Math.random()*2.5}s;animation-delay:${Math.random()*0.8}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5500);
  }
}
</script>
</body>
</html>
